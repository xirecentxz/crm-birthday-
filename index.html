<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Birthday Excel Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-extrabold text-slate-800">🎂 VIP Birthday Filter</h1>
            <p class="text-slate-500 mt-2">Upload file Excel (.xlsx) untuk memfilter jadwal follow-up customer.</p>
        </header>
        
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-8 text-center">
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-xl p-6 hover:border-blue-400 transition-colors">
                <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden"/>
                <label for="excelFile" class="cursor-pointer bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                    📁 Pilih File Excel (.xlsx)
                </label>
                <p id="fileName" class="mt-3 text-sm text-slate-400 font-mono italic">Belum ada file terpilih</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 hidden" id="statsArea">
            <div class="bg-emerald-500 p-6 rounded-2xl text-white shadow-lg">
                <p class="text-emerald-100 text-sm font-bold uppercase tracking-wider">H = 0</p>
                <h2 class="text-4xl font-black" id="count-h0">0</h2>
                <p class="mt-1 text-xs opacity-80">Ulang Tahun Hari Ini</p>
            </div>
            <div class="bg-amber-500 p-6 rounded-2xl text-white shadow-lg">
                <p class="text-amber-100 text-sm font-bold uppercase tracking-wider">H = -1 s/d -3</p>
                <h2 class="text-4xl font-black" id="count-hnear">0</h2>
                <p class="mt-1 text-xs opacity-80">Segera Follow Up</p>
            </div>
            <div class="bg-indigo-500 p-6 rounded-2xl text-white shadow-lg">
                <p class="text-indigo-100 text-sm font-bold uppercase tracking-wider">H = 1 s/d -7</p>
                <h2 class="text-4xl font-black" id="count-hpot">0</h2>
                <p class="mt-1 text-xs opacity-80">Potensi Birthday</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden hidden" id="tableArea">
            <div class="p-4 bg-slate-800 text-white flex justify-between items-center">
                <span class="font-bold">Daftar Customer Terfilter</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Nama</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">WhatsApp</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Tgl Ultah</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Status</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const monthMap = {
            'January': 1, 'February': 2, 'March': 3, 'April': 4, 'May': 5, 'June': 6,
            'July': 7, 'August': 8, 'September': 9, 'October': 10, 'November': 11, 'December': 12
        };

        const dt = luxon.DateTime;

        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('fileName').innerText = file.name;
            const reader = new FileReader();

            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // Ambil sheet pertama
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                
                processData(jsonData);
            };
            reader.readAsArrayBuffer(file);
        });

        function processData(data) {
            const today = dt.now().startOf('day');
            const tbody = document.getElementById('resultBody');
            let counts = { h0: 0, hnear: 0, hpot: 0 };
            
            tbody.innerHTML = '';
            document.getElementById('statsArea').classList.remove('hidden');
            document.getElementById('tableArea').classList.remove('hidden');

            data.forEach(row => {
                const rawDay = row['Anniversary day'];
                const rawMonth = row['Anniversary month'];
                
                if(!rawDay || !rawMonth) return;

                const day = parseInt(rawDay);
                const month = monthMap[rawMonth];
                if(!month) return;

                // Hitung Ultah tahun ini
                let bday = dt.fromObject({ year: today.year, month: month, day: day });
                
                // h = Today - Bday (Selisih Hari)
                const h = today.diff(bday, 'days').days;

                let status = "";
                let badgeClass = "";
                let rowColor = "";

                if (h === 0) {
                    status = "Hari Ini 🎂";
                    badgeClass = "bg-emerald-100 text-emerald-700";
                    rowColor = "bg-emerald-50/30";
                    counts.h0++;
                } else if (h >= -3 && h <= -1) {
                    status = "Segera Follow Up";
                    badgeClass = "bg-amber-100 text-amber-700";
                    rowColor = "bg-amber-50/30";
                    counts.hnear++;
                } else if (h === 1 || (h >= -7 && h <= -4)) {
                    status = "Potensi Birthday";
                    badgeClass = "bg-indigo-100 text-indigo-700";
                    rowColor = "";
                    counts.hpot++;
                }

                if (status !== "") {
                    const waLink = row.Telephone ? `https://wa.me/${row.Telephone.replace(/[^0-9]/g, '')}` : '#';
                    const tr = document.createElement('tr');
                    tr.className = rowColor + " hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-bold text-slate-800">${row.Name}</td>
                        <td class="px-6 py-4 text-slate-600 font-mono text-sm">${row.Telephone || '-'}</td>
                        <td class="px-6 py-4 text-slate-600">${day} ${rawMonth}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${badgeClass}">
                                ${status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <a href="${waLink}" target="_blank" class="inline-flex items-center px-3 py-1.5 bg-green-500 text-white rounded-md text-xs font-bold hover:bg-green-600 shadow-sm">
                                💬 WA
                            </a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            document.getElementById('count-h0').innerText = counts.h0;
            document.getElementById('count-hnear').innerText = counts.hnear;
            document.getElementById('count-hpot').innerText = counts.hpot;
        }
    </script>
</body>
</html>
