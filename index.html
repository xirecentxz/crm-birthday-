<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Birthday Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">🎂 CRM BIRTHDAY PRO</h1>
                <p class="text-slate-500">Upload, Filter, dan Download Data Customer VIP</p>
            </div>
            <div id="downloadArea" class="hidden">
                <button onclick="downloadExcel()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-emerald-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d=" virus 4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download Excel (.xlsx)
                </button>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div class="flex items-center justify-center w-full">
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-all">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <p id="fileStatus" class="mb-2 text-sm text-slate-500 font-semibold text-center px-4">Klik untuk Upload Database Excel Anda</p>
                        <p class="text-xs text-slate-400 font-mono italic" id="fileNameDisp"></p>
                    </div>
                    <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" />
                </label>
            </div>
        </div>

        <div id="controls" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Cari nama customer..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <div class="absolute left-3 top-3.5 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
            <select id="statusFilter" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none appearance-none bg-white">
                <option value="ALL">Semua Kategori (H=0 s/d Potensi)</option>
                <option value="Hari Ini">Hari Ini (H=0)</option>
                <option value="Segera Follow Up">Follow Up (-1 s/d -3)</option>
                <option value="Potensi Birthday">Potensi (1 s/d -7)</option>
            </select>
        </div>

        <div id="tableContainer" class="hidden bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold uppercase">Nama Customer</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">WhatsApp</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">Ulang Tahun</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">Status</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            <div id="noData" class="hidden p-10 text-center text-slate-400 italic">Data tidak ditemukan...</div>
        </div>
    </div>

    <script>
        const monthMap = {'January': 1, 'February': 2, 'March': 3, 'April': 4, 'May': 5, 'June': 6, 'July': 7, 'August': 8, 'September': 9, 'October': 10, 'November': 11, 'December': 12};
        let globalData = []; // Simpan data asli di sini
        let filteredData = []; // Data yang sedang ditampilkan

        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisp').innerText = file.name;
            document.getElementById('fileStatus').innerText = "File Berhasil Diupload!";
            
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                processInitialData(jsonData);
            };
            reader.readAsArrayBuffer(file);
        });

        function processInitialData(data) {
            const today = luxon.DateTime.now().startOf('day');
            globalData = data.map(row => {
                const day = parseInt(row['Anniversary day']);
                const month = monthMap[row['Anniversary month']];
                if (!day || !month) return null;

                const bday = luxon.DateTime.fromObject({ year: today.year, month: month, day: day });
                const h = today.diff(bday, 'days').days;

                let status = "";
                if (h === 0) status = "Hari Ini";
                else if (h >= -3 && h <= -1) status = "Segera Follow Up";
                else if (h === 1 || (h >= -7 && h <= -4)) status = "Potensi Birthday";

                return status ? { ...row, h_val: h, calculatedStatus: status } : null;
            }).filter(x => x !== null);

            showView();
            renderTable();
        }

        function showView() {
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('tableContainer').classList.remove('hidden');
            document.getElementById('downloadArea').classList.remove('hidden');
        }

        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterValue = document.getElementById('statusFilter').value;
            const tbody = document.getElementById('resultBody');
            
            filteredData = globalData.filter(item => {
                const matchName = item.Name.toLowerCase().includes(searchTerm);
                const matchStatus = filterValue === "ALL" || item.calculatedStatus === filterValue;
                return matchName && matchStatus;
            });

            tbody.innerHTML = '';
            if (filteredData.length === 0) {
                document.getElementById('noData').classList.remove('hidden');
            } else {
                document.getElementById('noData').classList.add('hidden');
                filteredData.forEach(row => {
                    const wa = row.Telephone ? row.Telephone.toString().replace(/[^0-9]/g, '') : '';
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-bold text-slate-800">${row.Name}</td>
                        <td class="px-6 py-4 text-slate-600 font-mono text-sm">${row.Telephone || '-'}</td>
                        <td class="px-6 py-4 text-slate-600 text-sm">${row['Anniversary day']} ${row['Anniversary month']}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${getStatusClass(row.calculatedStatus)}">${row.calculatedStatus}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${wa ? `<a href="https://wa.me/${wa}" target="_blank" class="bg-green-500 text-white p-2 rounded-lg text-xs hover:bg-green-600 inline-block">💬 Chat</a>` : '-'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function getStatusClass(status) {
            if (status === "Hari Ini") return "bg-emerald-100 text-emerald-700";
            if (status === "Segera Follow Up") return "bg-amber-100 text-amber-700";
            return "bg-indigo-100 text-indigo-700";
        }

        // Fitur Download Excel
        function downloadExcel() {
            if (filteredData.length === 0) return alert("Tidak ada data untuk didownload");
            
            // Hapus properti internal h_val dan calculatedStatus untuk hasil download yang bersih
            const exportData = filteredData.map(({ h_val, calculatedStatus, ...rest }) => ({
                ...rest,
                'Status Birthday': calculatedStatus
            }));

            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Birthday_Report");
            XLSX.writeFile(workbook, `Birthday_Report_${luxon.DateTime.now().toFormat('yyyy-MM-dd')}.xlsx`);
        }

        // Event Listeners untuk Filter
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('statusFilter').addEventListener('change', renderTable);
    </script>
</body>
</html>
